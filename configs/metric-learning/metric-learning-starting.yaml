# @package _global_
# Place the contents of this file at the config root rather than nesting under
# the "metric-learning" group name (Hydra's default for configs in subdirs).

models:
  detection-model: mshamrai/yolov8n-visdrone

# Two modes:
#   train — pretrain the triplet embedder on data.train.root → save reid.checkpoint_pretrain
#   test  — load reid.checkpoint_pretrain, finetune on data.val.root → save reid.checkpoint_finetuned,
#           then run the final MOT eval on data.test.mot_*

mode: test ## the mode to finetune

data:
  train:
    root: /workspace/cv-midterm/VisDrone2019-MOT-val  # used only in mode=train
  val:
    root: /workspace/cv-midterm/VisDrone2019-MOT-val    # used only in mode=test (finetuning crops)
  test:
    # Two ways to run the final MOT eval — pick ONE:
    #
    # Option A — full test-dev sweep (for the report):
    #   set `mot_root` to the test-dev root. Every sequence under
    #   <mot_root>/sequences/ is tracked, and motmetrics.compute_many aggregates
    #   per-sequence + OVERALL metrics (MOTA, IDF1, MOTP, IDSW, MT, ML).
    #   → leave `mot_sequence` / `mot_annotations` blank (or keep them — they
    #     are ignored for the final eval when mot_root is set, but they are
    #     still used if testing.mot_eval_every > 0 for cheap periodic checkpoints).
    #
    # Option B — single sequence (quick iteration / debugging):
    #   set `mot_sequence` + `mot_annotations`, leave `mot_root: null`.
    #   The final eval runs on that one sequence only.
    #
    # Periodic MOT eval during finetuning (testing.mot_eval_every > 0) ALWAYS
    # uses the single sequence `mot_sequence` — multi-seq during training is too
    # expensive.
    mot_sequence:    /workspace/cv-midterm/VisDrone2019-MOT-test-dev/sequences/uav0000009_03358_v
    mot_annotations: /workspace/cv-midterm/VisDrone2019-MOT-test-dev/annotations/uav0000009_03358_v.txt
    mot_root:        null # /workspace/cv-midterm/VisDrone2019-MOT-test-dev  # null → single-seq mode (Option B)

output:
  images_tracked: /workspace/cv-midterm/output_images_tracked_ml
  metrics_path:   /workspace/cv-midterm/detection_metrics_ml.txt
  history_path:   /workspace/cv-midterm/ml_history_${mode}.json
  save_images:    false   # true → annotate each frame with tracked bboxes + IDs.
                          # false → skip (recommended for the full test-dev sweep).

detection:
  conf: 0.25
  iou: 0.45
  agnostic_nms: false
  max_det: 1000
  imgsz: 1024

tracking:
  use_roi: true
  roi_coef: 0.25
  track_activation_threshold: 0.25
  lost_track_buffer: 30
  minimum_matching_threshold: 0.8
  frame_rate: 30
  num_workers: 4             # DataLoader workers prefetching frames during MOT eval (0 = sync)

reid:
  type: metric_learning
  # Backbone is inferred from checkpoint_pretrain's filename:
  #   * contains "resnet50" → torchvision ResNet50 (feat_dim=2048)
  #   * contains "swin_t"   → torchvision Swin-T   (feat_dim=768)
  # Anything else raises at build-time. So to swap architectures, point
  # checkpoint_pretrain at a differently-named .pth; no other field changes.
  backbone: resnet50
  weights: IMAGENET1K_V1
  checkpoint_pretrain:  /workspace/cv-midterm/resnet50_visdrone_best.pth
  checkpoint_finetuned: /workspace/cv-midterm/out/ml_resnet50/finetuned.pth
  out_dim: 128
  roi_out: [7, 7]
  roi_spatial_scale: 0.03125 # 1/32

# hyperparams for mode=train (pretraining on data.train.root)
training:
  steps: 50 # 5000
  batch_size: 64       # unused by TripletDataset sampler, kept for parity with SSL config
  lr: 0.0001
  num_workers: 4
  pin_memory: true
  log_every: 10
  seed: 69420
  # triplet-specific
  n_ids: 8             # identities per PK batch
  k_per_id: 4          # samples per identity per batch
  margin: 1.0          # base triplet margin
  max_k: 5             # max frame delta for positive pair selection / dynamic margin
  ce_weight: 0.5       # auxiliary cross-entropy weight (active only if model.classifier is set)
  hard_negatives: true # hardest-negative mining
  freeze_backbone: false
  scheduler:
    type: cosine       # none | cosine | step
    warmup_steps: 500  # linear warmup from lr*0.01 → lr (0 disables warmup)
    eta_min: 0.0       # cosine: lower bound lr
    step_size: 1000    # step: decay every N steps
    gamma: 0.1         # step: decay factor

# hyperparams for mode=test (finetuning on data.val.root, then MOT eval on data.test.*)
testing:
  steps: 500             # set to 0 to skip finetuning and evaluate the pretrain checkpoint directly
  batch_size: 64
  lr: 0.00001             # smaller LR for finetuning
  freeze_backbone: true   # only the head is finetuned by default
  num_workers: 4
  pin_memory: true
  log_every: 10
  mot_eval_every: 0       # 0 = only final MOT eval on test-dev; >0 = periodic during finetuning (expensive)
  val_every: 50           # steps between held-out triplet loss on the test data (0 disables).
                          # Uses data.test.mot_root if set (all test-dev seqs),
                          # otherwise falls back to data.test.mot_sequence (single-seq Option B).
  val_max_batches: 20     # PK batches per val pass (each drawn from the held-out identities)
  save_every: 2000        # stepped snapshots: <finetuned>.step{N}.pth (0 disables)
  # triplet-specific (mirrors training:, typically kept equal or tightened)
  n_ids: 8
  k_per_id: 4
  margin: 1.0
  max_k: 5
  ce_weight: 0.5
  hard_negatives: true
  scheduler:
    type: cosine
    warmup_steps: 100
    eta_min: 0.0
    step_size: 500
    gamma: 0.1

evaluation:
  verbose: true
