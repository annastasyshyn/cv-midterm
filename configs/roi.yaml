models:
    detection-model: mshamrai/yolov8n-visdrone
    feature-extraction-model: resnet50
data:
    dataset: VisDrone2019-MOT-val/sequences/uav0000086_00000_v
    annotations: VisDrone2019-MOT-val/annotations/uav0000086_00000_v
output:
    images_tracked: output_images_tracked
    metrics_path: detection_metrics.txt
detection:
    conf: 0.25
    iou: 0.45
    agnostic_nms: false
    max_det: 1000
tracking:
    use_roi: true
    roi_coef: 0.25
evaluation:
    verbose: true
