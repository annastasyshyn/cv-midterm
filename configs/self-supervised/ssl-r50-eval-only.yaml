# @package _global_
# Ablation A0 — ResNet50, NO finetune. Evaluates the pretrain checkpoint
# directly on test-dev. This is the control for A1/A2: any MOT delta between
# A0 and A1/A2 is attributable to the val-set finetune, not to SSL pretraining.
#
# Deviation from A1: testing.steps=0 (short-circuits the finetune loop in
# src/eval.py:382-454 and jumps straight to _run_final_mot).

models:
  detection-model: mshamrai/yolov8n-visdrone

mode: test

data:
  train:
    root: /workspace/cv-midterm/VisDrone2019-MOT-val
  val:
    root: /workspace/cv-midterm/VisDrone2019-MOT-val
  test:
    mot_sequence:    null
    mot_annotations: null
    mot_root:        /workspace/cv-midterm/VisDrone2019-MOT-test-dev

output:
  images_tracked: /workspace/cv-midterm/out/ssl_r50_eval_only/images
  metrics_path:   /workspace/cv-midterm/out/ssl_r50_eval_only/metrics.txt
  history_path:   /workspace/cv-midterm/out/ssl_r50_eval_only/history_${mode}.json
  save_images:    false

detection:
  conf: 0.25
  iou: 0.45
  agnostic_nms: false
  max_det: 1000
  imgsz: 1024

tracking:
  use_roi: true
  roi_coef: 0.15
  track_activation_threshold: 0.35
  lost_track_buffer: 25
  minimum_matching_threshold: 0.72
  frame_rate: 30

reid:
  type: self_supervised
  backbone: resnet50
  weights: IMAGENET1K_V1
  checkpoint_pretrain:  /workspace/cv-midterm/resnet50_visdrone_best.pth
  checkpoint_finetuned: /workspace/cv-midterm/out/ssl_r50_eval_only/unused.pth
  feat_dim: 2048
  embed_dim: 128
  temperature: 0.2
  roi_out: [7, 7]
  roi_spatial_scale: 0.03125

training:
  steps: 5000
  batch_size: 64
  crop_size: [256, 128]
  lr: 0.001
  num_workers: 4
  pin_memory: true
  log_every: 10
  seed: 69420
  scheduler:
    type: cosine
    warmup_steps: 500
    eta_min: 0.0
    step_size: 1000
    gamma: 0.1

testing:
  steps: 0                 # <-- ablation axis: skip finetune entirely
  batch_size: 64
  crop_size: [256, 128]
  lr: 0.0001
  freeze_backbone: true
  num_workers: 6
  pin_memory: true
  log_every: 10
  mot_eval_every: 0
  val_every: 0
  val_max_batches: 20
  save_every: 0            # eval-only (steps=0) has nothing to checkpoint
  scheduler:
    type: none
    warmup_steps: 0
    eta_min: 0.0
    step_size: 500
    gamma: 0.1

evaluation:
  verbose: true
